name: .NET Desktop Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-debug:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    env:   
      Solution_Name: N64RecompLauncher.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore ${{ env.Solution_Name }}

    - name: Build Debug
      run: dotnet build ${{ env.Solution_Name }} --configuration Debug --no-restore

    - name: Test
      run: dotnet test ${{ env.Solution_Name }} --configuration Debug --no-build --verbosity normal

  build-windows:
    runs-on: windows-latest
    
    env:
      Solution_Name: N64RecompLauncher.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore ${{ env.Solution_Name }}

    - name: Publish Windows x64
      run: dotnet publish ${{ env.Solution_Name }} -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/win-x64

    - name: Upload Windows x64
      uses: actions/upload-artifact@v4
      with:
        name: N64RecompLauncher-Windows-x64
        path: publish/win-x64
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    
    env:
      Solution_Name: N64RecompLauncher.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore ${{ env.Solution_Name }}

    - name: Publish Linux x64
      run: dotnet publish ${{ env.Solution_Name }} -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/linux-x64

    - name: Publish Linux ARM64
      run: dotnet publish ${{ env.Solution_Name }} -c Release -r linux-arm64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/linux-arm64

    - name: Upload Linux x64
      uses: actions/upload-artifact@v4
      with:
        name: N64RecompLauncher-Linux-x64
        path: publish/linux-x64
        retention-days: 30

    - name: Upload Linux ARM64
      uses: actions/upload-artifact@v4
      with:
        name: N64RecompLauncher-Linux-ARM64
        path: publish/linux-arm64
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    
    env:
      Solution_Name: N64RecompLauncher.sln
      APP_NAME: N64RecompLauncher

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore ${{ env.Solution_Name }}

    - name: Publish macOS x64
      run: dotnet publish ${{ env.Solution_Name }} -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/osx-x64

    - name: Install iconutil (for converting PNG to ICNS)
      run: |
        brew install imagemagick

    - name: Convert Icon to ICNS
      run: |
        # Create iconset directory
        mkdir -p Icon.iconset
        
        # Generate different icon sizes using ImageMagick
        magick Icon/icon.png -resize 16x16 Icon.iconset/icon_16x16.png
        magick Icon/icon.png -resize 32x32 Icon.iconset/icon_16x16@2x.png
        magick Icon/icon.png -resize 32x32 Icon.iconset/icon_32x32.png
        magick Icon/icon.png -resize 64x64 Icon.iconset/icon_32x32@2x.png
        magick Icon/icon.png -resize 128x128 Icon.iconset/icon_128x128.png
        magick Icon/icon.png -resize 256x256 Icon.iconset/icon_128x128@2x.png
        magick Icon/icon.png -resize 256x256 Icon.iconset/icon_256x256.png
        magick Icon/icon.png -resize 512x512 Icon.iconset/icon_256x256@2x.png
        magick Icon/icon.png -resize 512x512 Icon.iconset/icon_512x512.png
        magick Icon/icon.png -resize 1024x1024 Icon.iconset/icon_512x512@2x.png
        
        # Convert iconset to icns
        iconutil -c icns Icon.iconset -o ${{ env.APP_NAME }}.icns

    - name: Create macOS App Bundle
      run: |
        # Create app bundle structure
        APP_DIR="publish/osx-x64/${{ env.APP_NAME }}.app"
        mkdir -p "$APP_DIR/Contents/MacOS"
        mkdir -p "$APP_DIR/Contents/Resources"
        
        # Move executable and all dependencies to MacOS folder
        mv publish/osx-x64/* "$APP_DIR/Contents/MacOS/" 2>/dev/null || true
        
        # Copy icon
        cp ${{ env.APP_NAME }}.icns "$APP_DIR/Contents/Resources/"
        
        # Create Info.plist
        cat > "$APP_DIR/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleName</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundleDisplayName</key>
            <string>N64 Recomp Launcher</string>
            <key>CFBundleIdentifier</key>
            <string>com.n64recomp.launcher</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleExecutable</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundleIconFile</key>
            <string>${{ env.APP_NAME }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSSupportsAutomaticGraphicsSwitching</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        # Make executable
        chmod +x "$APP_DIR/Contents/MacOS/${{ env.APP_NAME }}"
        
        # Create a launcher script if needed (for debugging)
        cat > "$APP_DIR/Contents/MacOS/launcher.sh" << 'EOF'
        #!/bin/bash
        DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
        cd "$DIR"
        ./${{ env.APP_NAME }} "$@"
        EOF
        chmod +x "$APP_DIR/Contents/MacOS/launcher.sh"

    - name: Upload macOS App Bundle
      uses: actions/upload-artifact@v4
      with:
        name: N64RecompLauncher-macOS-x64
        path: publish/osx-x64/${{ env.APP_NAME }}.app
        retention-days: 30

  package-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: N64RecompLauncher-Windows-x64
        path: artifacts/windows-x64

    - name: Download Linux x64 Artifact
      uses: actions/download-artifact@v4
      with:
        name: N64RecompLauncher-Linux-x64
        path: artifacts/linux-x64

    - name: Download Linux ARM64 Artifact
      uses: actions/download-artifact@v4
      with:
        name: N64RecompLauncher-Linux-ARM64
        path: artifacts/linux-arm64

    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: N64RecompLauncher-macOS-x64
        path: artifacts/macos-x64

    - name: Create Release Packages
      run: |
        mkdir -p release-package
        
        # Package Windows
        cd artifacts/windows-x64
        zip -r ../../release-package/N64RecompLauncher-Windows-x64.zip .
        cd ../..
        
        # Package Linux x64
        cd artifacts/linux-x64
        tar -czf ../../release-package/N64RecompLauncher-Linux-x64.tar.gz .
        cd ../..
        
        # Package Linux ARM64
        cd artifacts/linux-arm64
        tar -czf ../../release-package/N64RecompLauncher-Linux-ARM64.tar.gz .
        cd ../..
        
        # Package macOS - zip the entire .app bundle directory
        cd artifacts/macos-x64
        zip -r ../../release-package/N64RecompLauncher-macOS-x64.zip .
        cd ../..

    - name: Upload Combined Release
      uses: actions/upload-artifact@v4
      with:
        name: N64RecompLauncher-All-Platforms
        path: release-package/
        retention-days: 90
